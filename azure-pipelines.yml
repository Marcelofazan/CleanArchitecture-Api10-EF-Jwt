trigger:
- main

pool:
  vmImage: 'windows-latest'

variables:
  buildPlatform: 'Any CPU'
  buildConfiguration: 'Release'

steps:
- task: NuGetToolInstaller@1
  displayName: 'Instalar NuGet'

- task: NuGetCommand@2
  displayName: 'Restaurar Pacotes NuGet'
  inputs:
    restoreSolution: '**/*.sln'

- task: VSBuild@1
  displayName: 'Compilar Soluções e Separar Artefatos'
  inputs:
    solution: '**/*.sln'
    platform: '$(buildPlatform)'
    configuration: '$(buildConfiguration)'
    # O OutDir separa automaticamente o resultado de cada projeto compilado em subpastas próprias
    msbuildArgs: '/p:DeployOnBuild=true /p:WebPublishMethod=Package /p:PackageAsSingleFile=true /p:SkipInvalidConfigurations=true /p:OutDir="$(build.artifactStagingDirectory)\%(Filename)"'

- task: PublishBuildArtifacts@1
  displayName: 'Disponibilizar Artefatos para Download'
  inputs:
    PathtoPublish: '$(build.artifactStagingDirectory)'
    ArtifactName: 'drop'
    publishLocation: 'Container'
